<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖕</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,
    body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#111;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Arial, sans-serif;
    }

    .finger{
        font-size:min(70vw, 70vh);
        line-height:1;
        user-select:none;
        animation:pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse{
        0%,100%{
            transform:scale(1);
        }
        50%{
            transform:scale(1.08);
        }
    }
</style>
</head>
<body>

<div class="finger">🖕</div>

</body>
</html>
